<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LUNA</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <nav class="navbar">
    <span class="logo">LUNA</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="player.html">Browse</a>
      <a href="login.html">Sign In</a>
    </div>
  </nav>
  <section class="hero">
    <h1>Watch. Share. Connect.</h1>
    <p>Your personal streaming community — powered by the night.</p>
  </section>
  <section class="grid-section">
    <h2>All Videos</h2>
    <div class="card-grid" id="video-grid">
      <p style="color:#9a8fb8">Loading videos...</p>
    </div>
  </section>
  <footer><p>LUNA &copy; 2026 &mdash; CSC 445 &mdash; Julianna, Cyrus, Marcello</p></footer>
  <script>
    const API = "https://2xf2izsgwg.execute-api.us-east-2.amazonaws.com";
    fetch(API + "/videos")
      .then(r => r.json())
      .then(videos => {
        const grid = document.getElementById("video-grid");
        if (!videos.length) {
          grid.innerHTML = '<p style="color:#9a8fb8">No videos yet.</p>';
          return;
        }
        grid.innerHTML = videos.map(v => `
          <div class="card" onclick="location.href='player.html?key=${v.s3Key}&title=${encodeURIComponent(v.title)}'">
            <div class="thumb">&#9654;</div>
            <p>${v.title}</p>
          </div>`).join('');
      })
      .catch(e => {
        document.getElementById("video-grid").innerHTML = '<p style="color:#f87171">Could not load videos: ' + e.message + '</p>';
      });
  </script>
</body>
</html>
