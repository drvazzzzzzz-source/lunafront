<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LUNA</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0d0b12;color:#e8e4f0}
    nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;background:#161222;border-bottom:1px solid rgba(168,85,247,0.2)}
    .logo{font-size:1.5rem;font-weight:800;letter-spacing:.15em;color:#a855f7}
    nav a{color:#9a8fb8;text-decoration:none;margin-left:1.5rem}
    nav a:hover{color:#e8e4f0}
    .btn{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-weight:600}
    .hero{text-align:center;padding:6rem 1rem 4rem;background:radial-gradient(ellipse 80% 60% at 50% 0%,#2a1f45,#0d0b12)}
    .hero h1{font-size:2.8rem;font-weight:800;margin-bottom:1rem}
    .hero p{color:#9a8fb8;font-size:1.1rem}
    .section{padding:3rem 2rem}
    .section h2{font-size:1.4rem;margin-bottom:1.5rem;color:#9a8fb8}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.25rem}
    .card{background:#161222;border-radius:10px;overflow:hidden;border:1px solid rgba(168,85,247,0.15);cursor:pointer;transition:transform .2s}
    .card:hover{transform:translateY(-4px);border-color:#a855f7}
    .thumb{width:100%;height:120px;background:linear-gradient(135deg,#2a1f45,#1a1030);display:flex;align-items:center;justify-content:center;font-size:2rem;color:#a855f7}
    .card p{padding:.75rem;font-size:.9rem;color:#9a8fb8}
    footer{text-align:center;padding:2rem;color:#9a8fb8;font-size:.85rem;margin-top:3rem;border-top:1px solid rgba(168,85,247,0.1)}
  </style>
</head>
<body>
  <nav>
    <span class="logo">LUNA</span>
    <div>
      <a href="/index.html">Home</a>
      <a href="/login.html">Sign In</a>
    </div>
  </nav>
  <div class="hero">
    <h1>Watch. Share. Connect.</h1>
    <p>Your personal streaming community &mdash; powered by the night.</p>
  </div>
  <div class="section">
    <h2>All Videos</h2>
    <div class="grid" id="grid"><p style="color:#9a8fb8">Loading videos...</p></div>
  </div>
  <footer><p>LUNA &copy; 2026 &mdash; CSC 445 &mdash; Julianna, Cyrus, Marcello</p></footer>
  <script>
    var API = "https://2xf2izsgwg.execute-api.us-east-2.amazonaws.com";
    fetch(API + "/videos")
      .then(function(r){ return r.json(); })
      .then(function(videos){
        var grid = document.getElementById("grid");
        if (!videos.length) { grid.innerHTML = '<p style="color:#9a8fb8">No videos yet.</p>'; return; }
        grid.innerHTML = videos.map(function(v){
          return '<div class="card" onclick="location.href=\'/player.html?key='+encodeURIComponent(v.s3Key)+'&title='+encodeURIComponent(v.title)+'\'"><div class="thumb">&#9654;</div><p>'+v.title+'</p></div>';
        }).join('');
      })
      .catch(function(){ document.getElementById("grid").innerHTML = '<p style="color:#f87171">Could not load videos.</p>'; });
  </script>
</body>
</html>
