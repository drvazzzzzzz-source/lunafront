<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LUNA - Watch</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0d0b12;color:#e8e4f0}
    nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;background:#161222;border-bottom:1px solid rgba(168,85,247,0.2)}
    .logo{font-size:1.5rem;font-weight:800;letter-spacing:.15em;color:#a855f7}
    nav a{color:#9a8fb8;text-decoration:none;margin-left:1.5rem}
    nav a:hover{color:#e8e4f0}
    .wrap{max-width:860px;margin:2rem auto;padding:0 1.25rem}
    h2{margin-bottom:1.25rem;font-size:1.6rem}
    video{width:100%;border-radius:12px;background:#000;display:block}
    .msg{margin-top:1rem;font-size:0.95rem;color:#9a8fb8}
    footer{text-align:center;padding:2rem;color:#9a8fb8;font-size:.85rem;margin-top:3rem;border-top:1px solid rgba(168,85,247,0.1)}
  </style>
</head>
<body>
  <nav>
    <span class="logo">LUNA</span>
    <div><a href="/index.html">Home</a></div>
  </nav>
  <div class="wrap">
    <h2 id="ttl">Loading...</h2>
    <video id="vid" controls playsinline></video>
    <p id="msg" class="msg">Fetching video...</p>
  </div>
  <footer><p>LUNA &copy; 2026 &mdash; CSC 445 &mdash; Julianna, Cyrus, Marcello</p></footer>
  <script>
    var API = "https://2xf2izsgwg.execute-api.us-east-2.amazonaws.com";
    var p = new URLSearchParams(window.location.search);
    var key = p.get("key");
    var title = p.get("title");
    document.getElementById("ttl").textContent = title ? decodeURIComponent(title) : "Video";
    if (!key) {
      document.getElementById("msg").textContent = "No video selected.";
    } else {
      fetch(API + "/video-url?key=" + encodeURIComponent(key))
        .then(function(r){ return r.json(); })
        .then(function(d){
          document.getElementById("msg").textContent = "";
          document.getElementById("vid").src = d.url;
          document.getElementById("vid").load();
        })
        .catch(function(e){
          document.getElementById("msg").textContent = "Error: " + e.message;
        });
    }
  </script>
</body>
</html>
